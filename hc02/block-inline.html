<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block_Inline</title>
</head>
<body>

      <!-- Block element -->

    <!-- Block Elementler: Block elementler, yeni satırdan başlar ve tüm satırı kaplar. Örnek olarak: <div>, <h1>, <p> gibi elementler block elementlerdir. Bunlara Background kalir eklersek tüm satiri kaplar. Genislik, yükseklik verebilirsin -->

    <h1>h1</h1>
    <p>paragraf</p>
    <div>div</div>

     <!-- Inline element --->

     <!-- Inline elementler, yeni satırdan başlamaz ve sadece içerdiği alanı kaplar. Örnek olarak: <span>, <a>, <strong>, <em> gibi elementler inline elementlerdir. Bunlara Background kalir eklersek sadece içerdiği alanı kaplar. Genislik, yükseklik veremezsin -->

      <span>span</span>
      <a href="https://google.com">google' GIT</a> 
      <strong>strong</strong>
      <em>ITALIC EM</em>   

      <br><br>

      <!-- Inline-Block elementler  -->

      <!-- Inline-block elementler, hem block hem de inline özelliklerini bir arada taşır. Örnek olarak: <img>, <input> gibi elementler inline-block elementlerdir. Bunlara Background kalir eklersek sadece içerdiği alanı kaplar. Genislik, yükseklik verebilirsin -->

        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQh_Tmsu1KcIjxRtXkhSVoZWnXGhZc0rjkfBQw4qstQ-A&s=10" alt="penguen" width="100px" height="auto">

        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQh_Tmsu1KcIjxRtXkhSVoZWnXGhZc0rjkfBQw4qstQ-A&s=10" alt="penguen" width="100px" height="auto">

    
</body>
</html>
