<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists</title>

<style>
    #mylist{
        li{
        background-color: rgb(238, 216, 216);
        margin: 2px;
        width: 150px;
        border-radius: 10px;
        padding: 5px;
        font-size: 20px;
        }

        li:hover{
            background-color: rgb(112, 109, 109); 
            color: white;
        }
    }
    </style> <!-- mausla elemntin üstüne geldigimde renk degistirsin istersem li:hover kullanirim -->

</head>
<body>

    <h4> Sirasiz Listeler (Unordered Lists - UL)</h4>
    <hr>

    <!-- sirali listelerden farki basinda rakam yerine nokta veya farkli sekiller olur. -->


    <ul style="list-style-type:square">
        <li>apfel</li>
        <li>birne</li>
        <li>kirsche</li>
        <li>erdbeer</li>    
        <li>banana</li>    
        <li>gemüse</li>   
        <ul style="list-style-type:circle">
            <li>tomate</li>
            <li>gurke</li>
            <li>paprika</li>    
            </ul>
    </ul>
    <hr>

    <ul style="list-style-type:none;" id="mylist"> <!-- Basinda birsey olmasin istersek none deriz / head kisminda css icin id verdik -->
        <li>apfel</li>
        <li>birne</li>
        <li>kirsche</li>
        <li>erdbeer</li>    
        <li>banana</li>       
    </ul>


    <!-- sirasiz listelerden farkli olarak sirali listelerde basinda rakam olur. Sirali listelerde baslangic degeri ve tersine dogru gitmesini istersek start ve reversed kullanabiliriz. -->

    <h4> Sirali Listeler (Ordered Lists - OL)</h4>
    <hr>
       <ol start="5" reversed >  <!-- 5'ten baslar, Baslangictan terse dogru gider reversed ile -->
        <li>apfel</li>
        <li>birne</li>
        <li>kirsche</li>
        <li>erdbeer</li>    
        <li>banana</li>    
    </ol>
    

</body>
</html>
